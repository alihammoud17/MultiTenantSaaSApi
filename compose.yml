services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - /etc/multitenant-saas-api/db.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - /etc/multitenant-saas-api/redis.env
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    restart: unless-stopped
    env_file:
      - /etc/multitenant-saas-api/api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"

  billing:
    build:
      context: .
      dockerfile: deploy/billing.Dockerfile
    restart: unless-stopped
    env_file:
      - /etc/multitenant-saas-api/billing.env
    environment:
      WORKFLOW_STATE_PATH: /var/lib/billing/state/.billing-workflow-state.json
    depends_on:
      api:
        condition: service_started
    expose:
      - "3001"
    volumes:
      - billing_state:/var/lib/billing/state

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      billing:
        condition: service_started
    ports:
      - "80:80"
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;

          location = /health {
            proxy_pass http://api:8080/health;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
          }

          location /billing/ {
            proxy_pass http://billing:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
          }
        }
        EOF
        nginx -g 'daemon off;'

volumes:
  postgres_data:
  billing_state:
